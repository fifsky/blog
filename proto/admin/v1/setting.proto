syntax = "proto3";
package fifsky.blog.admin.v1;

import "types/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "gen/admin/v1";

message AdminSetting {
  string site_name = 1;
  string site_desc = 2;
  string site_keyword = 3;
  int32 post_num = 4;
  string ai_endpoint = 5;
  string ai_model = 6;
  string ai_token = 7;
}

// SettingService 提供设置相关的接口
service SettingService {
  // Get 获取后台设置
  rpc Get(google.protobuf.Empty) returns (AdminSetting) {
    option (google.api.http) = {
      post: "/blog/admin/setting"
      body: "*"
    };
  }

  // Update 更新设置
  rpc Update(AdminSetting) returns (AdminSetting) {
    option (google.api.http) = {
      post: "/blog/admin/setting/update"
      body: "*"
    };
  }
}
