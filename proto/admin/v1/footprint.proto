syntax = "proto3";
package fifsky.blog.admin.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "types/common.proto";

option go_package = "gen/admin/v1";

// FootprintService 提供足迹管理相关的接口
service FootprintService {
  // List 获取足迹列表
  rpc List(FootprintListRequest) returns (FootprintListResponse) {
    option (google.api.http) = {
      post: "/blog/admin/footprint/list"
      body: "*"
    };
  }
  // Create 创建足迹
  rpc Create(FootprintCreateRequest) returns (fifsky.blog.types.IDResponse) {
    option (google.api.http) = {
      post: "/blog/admin/footprint/create"
      body: "*"
    };
  }
  // Update 更新足迹
  rpc Update(FootprintUpdateRequest) returns (fifsky.blog.types.IDResponse) {
    option (google.api.http) = {
      post: "/blog/admin/footprint/update"
      body: "*"
    };
  }
  // Delete 删除足迹
  rpc Delete(FootprintDeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/blog/admin/footprint/delete"
      body: "*"
    };
  }
}

// FootprintPhotoItem 足迹照片项
message FootprintPhotoItem {
  string src = 1;
  string thumbnail = 2;
}

// FootprintItem 足迹列表项
message FootprintItem {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string longitude = 4;
  string latitude = 5;
  string date = 6;
  string marker_color = 7;
  repeated string categories = 8;
  string url = 9;
  string url_label = 10;
  repeated FootprintPhotoItem photos = 11;
  string created_at = 12;
}

// FootprintListRequest 分页请求
message FootprintListRequest {
  int32 page = 1 [(buf.validate.field).int32.gt = 0];
}

// FootprintListResponse 足迹列表响应
message FootprintListResponse {
  repeated FootprintItem list = 1;
  int32 total = 2;
}

// FootprintCreateRequest 创建足迹请求
message FootprintCreateRequest {
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
  string description = 2;
  string longitude = 3 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
  string latitude = 4 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
  string date = 5;
  string marker_color = 6;
  repeated string categories = 7;
  string url = 8;
  string url_label = 9;
  repeated string photo_urls = 10;
}

// FootprintUpdateRequest 更新足迹请求
message FootprintUpdateRequest {
  int32 id = 1 [
    (buf.validate.field).int32.gt = 0,
    (google.api.field_behavior) = REQUIRED
  ];
  string name = 2;
  string description = 3;
  string longitude = 4;
  string latitude = 5;
  string date = 6;
  string marker_color = 7;
  repeated string categories = 8;
  string url = 9;
  string url_label = 10;
  repeated string photo_urls = 11;
}

// FootprintDeleteRequest 删除足迹请求
message FootprintDeleteRequest {
  int32 id = 1 [
    (buf.validate.field).int32.gt = 0,
    (google.api.field_behavior) = REQUIRED
  ];
}
