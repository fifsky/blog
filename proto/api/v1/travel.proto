syntax = "proto3";
package fifsky.blog.api.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";

option go_package = "gen/api/v1";

// TravelService 提供旅行足迹相关的接口
service TravelService {
  // GetFootprints 获取所有足迹数据
  rpc GetFootprints(GetFootprintsRequest) returns (GetFootprintsResponse) {
    option (google.api.http) = {
      post: "/blog/travel/footprints"
      body: "*"
    };
  }
}

// FootprintPhoto 足迹照片
message FootprintPhoto {
  string src = 1;
  string thumbnail = 2;
}

// Footprint 足迹点
message Footprint {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string longitude = 4;
  string latitude = 5;
  string date = 6;
  string marker_color = 7;
  repeated string categories = 8;
  string url = 9;
  string url_label = 10;
  repeated FootprintPhoto photos = 11;
}

// GetFootprintsRequest 获取足迹请求
message GetFootprintsRequest {}

// GetFootprintsResponse 足迹响应
message GetFootprintsResponse {
  repeated Footprint footprints = 1;
}
