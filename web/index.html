<html lang="zh-CN">

    <link rel="icon" href="/assets/images/favicon.ico" />

    <link rel="stylesheet" href="/assets/js/footprintmap.css" />

    <script defer src="/assets/js/footprintmap.js"></script>
    <script defer src="/assets/js/plugin-visited.js"></script>

      src="https://cloud.umami.is/script.js"
      data-website-id="4ff9315c-e44f-41c0-a338-17f7e248f905"
    ></script>
    <!-- APlayer & MetingJS 非关键功能，defer 加载 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdmirror.com/npm/aplayer/dist/APlayer.min.css"
    />
    <script defer src="https://cdn.jsdmirror.com/npm/aplayer/dist/APlayer.min.js"></script>
