apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: fifsky-blog-job
build:
  artifacts:
    - image: registry.cn-shanghai.aliyuncs.com/fifsky/fifsky-blog-job
      context: .
      docker:
        dockerfile: deploy/job/Dockerfile
  tagPolicy:
    dateTime:
      format: 2006-01-02-15-04-05
      timezone: Local
  local:
    push: true
manifests:
  rawYaml:
    - deploy/job/k8s.local.yaml
deploy:
  kubectl:
    flags:
      apply:
        - --force=true
        - --grace-period=0
    defaultNamespace: default
  kubeContext: fifsky
